<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Simulator - Report</title>
    <link rel="stylesheet" href="style.css">

    <link href='https://fonts.googleapis.com/css?family=New Tegomin' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Notable' rel='stylesheet'>

    <link rel="icon" type="image/x-icon" href="https://static.thenounproject.com/png/4158718-200.png">
</head>
<body>
    <div id="results-screen" class="screen">
        <h1>Your Life Report</h1>
        <div class="report-card">
            <p><strong>Born:</strong> <span id="res-year"></span></p>
            <p><strong>Country of Origin:</strong> <span id="res-country"></span></p>
            <p><strong>Lived until:</strong> Age <span id="res-age"></span></p>
            <hr>
            <p><strong>Defining Moment (Young Adulthood):</strong></p>
            <p id="res-event" class="highlight-event"></p>
        </div>
        <button class="birth-button" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const country = localStorage.getItem("report_country");
            const age = localStorage.getItem("report_age");
            const year = localStorage.getItem("report_year");
            const event = localStorage.getItem("report_event");
            
            let buttonText=  ["Play Again", "Second Chance?", "Make Worse Decisions?", "Make Better Decisions?", "New Turn of Events?"];
            let button = document.querySelector(".birth-button");
            button.textContent = buttonText[Math.floor(Math.random() * 5)];

            if (country) document.getElementById("res-country").textContent = country;
            if (age) document.getElementById("res-age").textContent = age;
            if (year) document.getElementById("res-year").textContent = year;
            if (event) document.getElementById("res-event").textContent = event;
        });

        function resetGame() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
